<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agent Login | Telecom CRM</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .language-switch {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .brand-title {
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="language-switch">
    <select class="form-select form-select-sm" onchange="switchLanguage(this.value)">
        <option value="en">English</option>
        <option value="sn">Shona</option>
        <option value="nd">Ndebele</option>
    </select>
</div>

<div class="card login-card p-4">

    <div class="text-center mb-4">
        <h3 class="brand-title text-primary">
            <i class="fa-solid fa-signal"></i> Telecom CRM
        </h3>
        <p id="loginTitle">Agent Login Portal</p>
    </div>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('login') }}">

        <div class="mb-3">
            <label class="form-label" id="labelAgent">Agent ID</label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="fa-solid fa-user"></i>
                </span>
                <input type="text" name="agent_id" class="form-control" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label" id="labelPassword">Password</label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="fa-solid fa-lock"></i>
                </span>
                <input type="password" name="password" class="form-control" required>
            </div>
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" name="remember">
            <label class="form-check-label" id="rememberLabel">Remember Me</label>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            <i class="fa-solid fa-right-to-bracket"></i>
            <span id="loginBtn">Login</span>
        </button>
    </form>

    <hr>

    <div class="text-center">
        <small class="text-muted">
            © 2026 Telecom CRM | SLA • Churn • USSD • SMS
        </small>
    </div>

</div>

<script>
function switchLanguage(lang) {
    const translations = {
        en: {
            title: "Agent Login Portal",
            agent: "Agent ID",
            password: "Password",
            remember: "Remember Me",
            login: "Login"
        },
        sn: {
            title: "Nzvimbo Yekupinda yeMumiriri",
            agent: "Chitupa cheMumiriri",
            password: "Pasiwedhi",
            remember: "Rangarira Ini",
            login: "Pinda"
        },
        nd: {
            title: "Indawo Yokungena Yomsebenzi",
            agent: "I-ID Yomsebenzi",
            password: "Iphasiwedi",
            remember: "Ngikhumbule",
            login: "Ngena"
        }
    };

    document.getElementById("loginTitle").innerText = translations[lang].title;
    document.getElementById("labelAgent").innerText = translations[lang].agent;
    document.getElementById("labelPassword").innerText = translations[lang].password;
    document.getElementById("rememberLabel").innerText = translations[lang].remember;
    document.getElementById("loginBtn").innerText = translations[lang].login;
}
</script>

</body>
</html>
